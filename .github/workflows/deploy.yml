name: CI/CD - Build, Push and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./BookinhMVC
          file: ./BookinhMVC/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nhom6-booking:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nhom6-booking:${{ github.sha }}

  deploy-to-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # 1. Kéo code mới nhất từ Docker Hub
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/nhom6-booking:latest
            
            # 2. Tạo network bảo mật giữa các container
            docker network create nhom6-network || true
            
            # 3. Chạy sẵn MySQL (Chỉ dùng được cho tài khoản mysql:8.0 chuẩn)
            docker start mysql || docker run -d --name mysql --network nhom6-network -e MYSQL_ROOT_PASSWORD=YourPassword123 -e MYSQL_DATABASE=BookingDB -p 3306:3306 --restart always mysql:8.0
            
            # 4. Tắt rọn rác app cũ
            docker stop nhom6-booking || true
            docker rm nhom6-booking || true
            
            # 5. Khởi động app mới của nhóm 6 đã sửa SQL & kết nối vào MySQL
            docker run -d \
              --name nhom6-booking \
              --network nhom6-network \
              -p 8080:5062 \
              --restart always \
              -e "ASPNETCORE_ENVIRONMENT=Development" \
              -e "ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=BookingDB;User=root;Password=YourPassword123;" \
              ${{ secrets.DOCKERHUB_USERNAME }}/nhom6-booking:latest
              
            echo "🔥 Deploy Thanh Cong!!"
