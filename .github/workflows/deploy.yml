name: CI/CD - Build and Push Docker Image

on:
  push:
    branches: [ "main" ]  # Chỉ chạy khi push lên nhánh main

jobs:
  build-and-push:
    name: Build Docker Image & Push to Docker Hub
    runs-on: ubuntu-latest  # Dùng máy ảo Ubuntu của GitHub

    steps:
      # Bước 1: Checkout code từ repository
      - name: Checkout source code
        uses: actions/checkout@v6.0.2

      # Bước 2: Đăng nhập vào Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Bước 3: Setup Docker Buildx (hỗ trợ multi-platform build)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      # Bước 4: Build Image và Push lên Docker Hub với tags
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./BookinhMVC          # Thư mục chứa Dockerfile
          file: ./BookinhMVC/Dockerfile  # Đường dẫn tới Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nhom6-booking:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nhom6-booking:${{ github.sha }}
