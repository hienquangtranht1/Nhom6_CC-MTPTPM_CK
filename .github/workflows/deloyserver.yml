name: Deloy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6.0.2

      - name: Login to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./BookinhMVC
          file: ./BookinhMVC/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nhom6-booking:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nhom6-booking:${{ github.sha }}

  deploy-to-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

        steps:
      - name: SSH Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/nhom6-booking:latest
            
            # Tạo network nếu chưa có
            docker network create nhom6-network || true
            
            # Đảm bảo MySQL luôn chạy
            docker start mysql || docker run -d --name mysql --network nhom6-network -e MYSQL_ROOT_PASSWORD=YourPassword123 -e MYSQL_DATABASE=BookingDB -p 3306:3306 --restart always mysql:8.0
            
            # Tắt app cũ
            docker stop nhom6-booking || true
            docker rm nhom6-booking || true
            
            # Chạy app mới (Nhớ kết nối mạng mysql và bật Development mode để xem lỗi nếu có)
            docker run -d \
              --name nhom6-booking \
              --network nhom6-network \
              -p 8080:5062 \
              --restart always \
              -e "ASPNETCORE_ENVIRONMENT=Development" \
              -e "ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=BookingDB;User=root;Password=YourPassword123;" \
              ${{ secrets.DOCKERHUB_USERNAME }}/nhom6-booking:latest
              
            echo "Deploy thanh cong!"

